<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reningssystem - Solsystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-color-rening: #14b8a6;      /* teal — Reningssystem (parent) */
            --glow-color-fasta: #f59e0b;       /* amber — Fasta */
            --glow-color-keto: #a3e635;        /* lime  — Keto */
            --glow-color-underskott: #ec4899; /* rose  — Underskott med Kolhydrater */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e5e7eb;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Particle background (matches hub style) */
        .particle-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image:
                radial-gradient(1px 1px at 25% 15%, rgba(229, 231, 235, 0.4), transparent),
                radial-gradient(1px 1px at 50% 35%, rgba(229, 231, 235, 0.3), transparent),
                radial-gradient(1px 1px at 75% 55%, rgba(229, 231, 235, 0.4), transparent),
                radial-gradient(2px 2px at 15% 75%, rgba(20, 184, 166, 0.4), transparent),
                radial-gradient(2px 2px at 85% 5%, rgba(20, 184, 166, 0.3), transparent);
            animation: move-particles 120s linear infinite;
        }
        @keyframes move-particles {
            from { background-position: 0 0; }
            to   { background-position: -1000px 500px; }
        }

        .interactive-hub {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Central sun = Reningssystem (teal) */
        .central-sun {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, #ccfbf1 0%, #14b8a6 60%, #0f766e 100%);
            animation: pulse-sun 4s ease-in-out infinite;
        }
        @keyframes pulse-sun {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px #14b8a6, 0 0 40px #5eead4, inset 0 0 10px #ccfbf1;
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 35px #14b8a6, 0 0 60px #5eead4, inset 0 0 15px #ccfbf1;
            }
        }

        .planet-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .planet {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 80px;
            height: 80px;
            margin: -40px;
            cursor: pointer;
            animation-duration: 40s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            display: flex;
            justify-content: center;
        }

        .planet-visual {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid;
            box-shadow: 0 0 10px;
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        .planet:hover .planet-visual {
            transform: scale(1.2);
        }

        .planet-container.is-paused .planet {
            animation-play-state: paused;
        }

        .planet-icon-wrapper {
            transition: transform 0.3s ease-out;
        }
        .planet:hover .planet-icon-wrapper {
            transform: scale(1.25);
        }

        .planet .planet-label {
            position: absolute;
            bottom: -30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
            text-shadow: 0 0 5px;
            color: white;
            white-space: nowrap;
        }
        .planet:hover .planet-label {
            opacity: 1;
        }

        /* Per-planet glow colors */
        .planet-fasta .planet-visual {
            border-color: var(--glow-color-fasta);
            box-shadow: 0 0 10px var(--glow-color-fasta);
        }
        .planet-fasta { animation-name: orbit-fasta; }
        .planet-fasta .planet-label { color: var(--glow-color-fasta); text-shadow: 0 0 5px var(--glow-color-fasta); }
        .planet-fasta:hover .planet-visual { box-shadow: 0 0 25px var(--glow-color-fasta); }

        .planet-keto .planet-visual {
            border-color: var(--glow-color-keto);
            box-shadow: 0 0 10px var(--glow-color-keto);
        }
        .planet-keto { animation-name: orbit-keto; }
        .planet-keto .planet-label { color: var(--glow-color-keto); text-shadow: 0 0 5px var(--glow-color-keto); }
        .planet-keto:hover .planet-visual { box-shadow: 0 0 25px var(--glow-color-keto); }

        .planet-underskott .planet-visual {
            border-color: var(--glow-color-underskott);
            box-shadow: 0 0 10px var(--glow-color-underskott);
        }
        .planet-underskott { animation-name: orbit-underskott; }
        .planet-underskott .planet-label { color: var(--glow-color-underskott); text-shadow: 0 0 5px var(--glow-color-underskott); }
        .planet-underskott:hover .planet-visual { box-shadow: 0 0 25px var(--glow-color-underskott); }

        /* 3 planets: 120° apart */
        @keyframes orbit-fasta {
            from { transform: rotate(0deg) translateY(-200px) rotate(0deg); }
            to   { transform: rotate(360deg) translateY(-200px) rotate(-360deg); }
        }
        @keyframes orbit-keto {
            from { transform: rotate(120deg) translateY(-200px) rotate(-120deg); }
            to   { transform: rotate(480deg) translateY(-200px) rotate(-480deg); }
        }
        @keyframes orbit-underskott {
            from { transform: rotate(240deg) translateY(-200px) rotate(-240deg); }
            to   { transform: rotate(600deg) translateY(-200px) rotate(-600deg); }
        }

        /* Back button (top left) */
        .back-link {
            position: fixed;
            top: 24px;
            left: 24px;
            color: var(--glow-color-rening);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            padding: 8px 14px;
            border: 1px solid var(--glow-color-rening);
            border-radius: 999px;
            background: rgba(20, 184, 166, 0.06);
            transition: background 0.2s ease, box-shadow 0.2s ease;
            z-index: 20;
        }
        .back-link:hover {
            background: rgba(20, 184, 166, 0.18);
            box-shadow: 0 0 18px rgba(20, 184, 166, 0.4);
        }

        /* Header text (top center) */
        .page-header {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .page-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--glow-color-rening);
            text-shadow: 0 0 10px rgba(20, 184, 166, 0.6);
            letter-spacing: 0.08em;
            margin: 0;
        }
        .page-header p {
            color: #94a3b8;
            margin: 6px 0 0;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="particle-bg"></div>

    <a class="back-link" href="index.html">← Tillbaka till Solsystemet</a>

    <header class="page-header">
        <h1>Reningssystem</h1>
        <p>Tre skilda system — välj det som passar dig.</p>
    </header>

    <main class="interactive-hub">
        <div class="central-sun"></div>
        <div class="planet-container">
            <!-- Planet: Fasta -->
            <a href="#fasta" class="planet planet-fasta" id="planet-fasta">
                <div class="planet-visual">
                    <div class="planet-icon-wrapper">
                        <!-- Icon: Hourglass (time / fasting) -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stroke-current text-amber-400"><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414-4.414A2 2 0 0 1 7 6.172V2"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414 4.414A2 2 0 0 1 17 17.828V22"/></svg>
                    </div>
                </div>
                <span class="planet-label">Fasta</span>
            </a>

            <!-- Planet: Keto -->
            <a href="#keto" class="planet planet-keto" id="planet-keto">
                <div class="planet-visual">
                    <div class="planet-icon-wrapper">
                        <!-- Icon: Flame (ketosis / fat-burning) -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stroke-current text-lime-400"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                    </div>
                </div>
                <span class="planet-label">Keto</span>
            </a>

            <!-- Planet: Underskott med Kolhydrater -->
            <a href="#underskott" class="planet planet-underskott" id="planet-underskott">
                <div class="planet-visual">
                    <div class="planet-icon-wrapper">
                        <!-- Icon: Scale (calorie deficit / balance) -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stroke-current text-rose-400"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>
                    </div>
                </div>
                <span class="planet-label">Underskott med Kolhydrater</span>
            </a>
        </div>
    </main>

    <script>
        // Pause orbit on hover (same UX as main hub)
        const planetContainer = document.querySelector('.planet-container');
        const planets = document.querySelectorAll('.planet');

        planets.forEach(planet => {
            planet.addEventListener('mouseenter', () => {
                planetContainer.classList.add('is-paused');
            });
            planet.addEventListener('mouseleave', () => {
                planetContainer.classList.remove('is-paused');
            });
        });
    </script>
</body>
</html>
